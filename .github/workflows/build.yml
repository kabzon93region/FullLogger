name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check project layout
        shell: bash
        run: |
          test -f FullLogger.csproj
          test -f src/PluginCore.cs
          test -f README.md
          test -f LICENSE
          echo "Full Logger repo layout OK"
